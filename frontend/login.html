<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudNotes - Secure Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-card">
        <h1 id="form-title">CloudNotes</h1>
        <p class="subtitle" id="form-subtitle">Welcome back! Please enter your details.</p>
        
        <form id="auth-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="name@company.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" id="submit-btn">Sign In</button>
        </form>

        <a href="#" id="toggle-auth" class="toggle-link">
            Don't have an account? <strong>Create one for free</strong>
        </a>
    </div>

    <div id="toast" class="toast"></div>

    <script src="app.js"></script>
    <script>
        if (localStorage.getItem('notes_token')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
